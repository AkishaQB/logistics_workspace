services:
  # ─── Stage 1: Courier Track / Collection ────────────────────────────────────
  courier-track-db:
    image: postgres:16-alpine
    container_name: ak-courier-track-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_TRACK}
    ports:
      - "5433:5432"
    volumes:
      - courier_track_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_TRACK}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Stage 2: Courier Logistics BE ──────────────────────────────────────────
  courier-logistics-db:
    image: postgres:16-alpine
    container_name: ak-courier-logistics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_LOGISTICS}
    ports:
      - "5435:5432"
    volumes:
      - courier_logistics_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_LOGISTICS}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  workspace:
    image: mcr.microsoft.com/devcontainers/typescript-node:1-22
    container_name: ak-workspace
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    depends_on:
      - courier-track-db
      - courier-logistics-db
    command: sleep infinity

volumes:
  courier_track_pgdata:
  courier_logistics_pgdata:
